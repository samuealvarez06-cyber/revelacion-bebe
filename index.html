<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revelación</title>

<style>
body{
  margin:0;
  font-family: Arial;
  text-align:center;
  background:#f5e6d3;
}

.seccion{ display:none; padding:20px; }
.activa{ display:block; }

button{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#8b5e3c;
  color:white;
}
</style>
</head>

<body>

<div id="p1" class="seccion activa">
<h1>👶 Revelación de Género</h1>
<p>Sábado 20 Junio - 3:00 PM</p>
<p>San Nicolás Tolentino</p>

<button onclick="mostrar('p2')">Ver Dress Code</button>
</div>

<div id="p2" class="seccion">
<h1>👗 Dress Code</h1>
<p>Hombre: camisa blanca, jeans</p>
<p>Mujer: blanco elegante</p>

<button onclick="mostrar('p1')">Regresar</button>
</div>

<script>
function mostrar(id){
  document.getElementById("p1").classList.remove("activa");
  document.getElementById("p2").classList.remove("activa");
  document.getElementById(id).classList.add("activa");
}
</script>

</body>
</html>
