<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Revelación</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  overflow-x:hidden;
}

/* SECCIONES */
.seccion{
  display:none;
  width:100%;
  height:100vh;
}

.activa{
  display:block;
}

/* FONDOS */
#p1{
  background: url('fondo1.jpg') no-repeat center/cover;
}

#p2{
  background: url('fondo2.jpg') no-repeat center/cover;
}

/* BOTONES */
.btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#8b5e3c;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* BOTON REGRESO */
.back{
  position:absolute;
  top:20px;
  left:20px;
}
</style>

</head>

<body>

<!-- 🧸 PAGINA 1 -->
<div id="p1" class="seccion activa">

<button class="btn" onclick="mostrar('p2')">
Ver Dress Code
</button>

</div>

<!-- 👗 PAGINA 2 -->
<div id="p2" class="seccion">

<button class="btn back" onclick="mostrar('p1')">
⬅️ Regresar
</button>

</div>

<script>
function mostrar(id){
  document.getElementById("p1").classList.remove("activa");
  document.getElementById("p2").classList.remove("activa");
  document.getElementById(id).classList.add("activa");
}
</script>

</body>
</html>
