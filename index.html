<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Revelación Género</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  overflow:hidden;
}

/* SECCIONES */
.seccion{
  position:absolute;
  width:100%;
  height:100vh;
  top:0;
  left:0;
  opacity:0;
  transition:1s;
}

.activa{
  opacity:1;
  z-index:1;
}

/* FONDOS */
#p1{
  background:url('./fondo1.jpg') center/cover no-repeat;
}

#p2{
  background:url('./fondo2.jpg') center/cover no-repeat;
}

/* TARJETA */
.contenido{
  background:rgba(255,255,255,0.9);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  margin:60px auto;
  text-align:center;
  animation:fadeUp 1s;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* TITULOS */
h1{
  font-family:'Playfair Display';
  color:#6b4c3b;
}

.fecha{
  font-weight:bold;
  font-size:1.4em;
}

/* BOTONES */
button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#8b5e3c;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#6b4c3b;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* CONFETI */
.confeti{
  position:fixed;
  width:10px;
  height:10px;
  background:red;
  top:-10px;
  animation:fall 3s linear infinite;
}

@keyframes fall{
  to{ transform:translateY(100vh) rotate(360deg);}
}
</style>

</head>

<body>

<!-- 🎵 MUSICA -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<!-- 🧸 PAGINA 1 -->
<div id="p1" class="seccion activa">

<div class="contenido">
<h2>Acompáñanos a nuestra</h2>
<h1>Revelación de Género</h1>

<p class="fecha">Sábado 20 - 3:00 PM</p>
<p>Junio</p>

<p>📍 San Nicolás Tolentino</p>
<p>Calle El Potrerito</p>
<p>📞 7227461882</p>

<h3>Opciones de regalo</h3>
<p>💙 Niño: Pañales</p>
<p>💗 Niña: Toallitas</p>

<button onclick="cambiar('p2')">Ver Dress Code 👗</button>
<button onclick="confeti()">🎉 Celebrar</button>
</div>

</div>

<!-- 👗 PAGINA 2 -->
<div id="p2" class="seccion">

<div class="contenido">
<h1>Dress Code</h1>

<h3>👨 Hombre</h3>
<p>Camisa blanca</p>
<p>Jeans oscuros</p>

<h3>👩 Mujer</h3>
<p>Camisa blanca</p>
<p>Jeans oscuros</p>
<p>Vestido blanco</p>

<button onclick="cambiar('p1')">⬅️ Regresar</button>
</div>

</div>

<!-- 📲 WHATSAPP -->
<a class="whatsapp" href="https://wa.me/527227461882" target="_blank">💬</a>

<script>
function cambiar(id){
  document.getElementById("p1").classList.remove("activa");
  document.getElementById("p2").classList.remove("activa");
  document.getElementById(id).classList.add("activa");
}

function confeti(){
  for(let i=0;i<50;i++){
    let c=document.createElement("div");
    c.className="confeti";
    c.style.left=Math.random()*100+"%";
    c.style.backgroundColor=["#ff66b2","#4da6ff","#ffd700"][Math.floor(Math.random()*3)];
    document.body.appendChild(c);

    setTimeout(()=>c.remove(),3000);
  }
}
</script>

</body>
</html>
